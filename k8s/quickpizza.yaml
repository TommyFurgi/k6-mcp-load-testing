apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickpizza
  labels:
    app: quickpizza
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quickpizza
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3333"
        prometheus.io/path: "/metrics"
      labels:
        app: quickpizza
      labels:
        app: quickpizza
    spec:
      containers:
      - name: quickpizza
        image: quickpizza:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3333
---
apiVersion: v1
kind: Service
metadata:
  name: quickpizza
spec:
  type: NodePort
  selector:
    app: quickpizza
  ports:
    - protocol: TCP
      port: 80   
      targetPort: 3333